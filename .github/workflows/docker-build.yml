name: Docker Build & Push (GHCR)

on:
  push:
    branches: ['**'] # build on push to any branch
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: docker-build  # 🔒 Ensures secrets are only accessible in approved branches

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: get_tags
        run: |
          # sanitize branch name for tag usage: replace non-alphanum with -
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == "$GITHUB_REF" ]]; then
            # not a branch push; maybe a tag push or other event
            BRANCH="${GITHUB_REF#refs/tags/}"
          fi
          SAFE_BRANCH=$(echo "$BRANCH" | tr '/_' '-' | sed 's/[^A-Za-z0-9.-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          IMAGE_TAG="${SAFE_BRANCH}-${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> "$GITHUB_ENV"
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
            echo "IS_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Build Docker Image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          docker build -t ${IMAGE_NAME}:${{ env.IMAGE_TAG }} .


      - name: Push Docker image to GHCR
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          docker push ${IMAGE_NAME}:${{ env.IMAGE_TAG }}

      - name: Also tag and push :latest when on main
        if: ${{ env.SAFE_BRANCH == 'main' }}
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          docker tag ${IMAGE_NAME}:${{ env.IMAGE_TAG }} ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:latest

      - name: Push release tags
        if: ${{ env.IS_RELEASE == 'true' }}
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          docker tag ${IMAGE_NAME}:${{ env.RELEASE_TAG }} ${IMAGE_NAME}:latest || true
          docker push ${IMAGE_NAME}:${{ env.RELEASE_TAG }} || true
          docker push ${IMAGE_NAME}:latest || true
