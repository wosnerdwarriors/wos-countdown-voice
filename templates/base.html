<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WOS Tools{% endblock %}</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display:none; }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark mb-3">
  <a class="navbar-brand" href="/">WOS</a>
  <ul class="navbar-nav mr-auto">
    <li class="nav-item"><a class="nav-link" href="/">Bot</a></li>
    <li class="nav-item"><a class="nav-link" href="/rally">Rally Tracker</a></li>
  <li class="nav-item"><a class="nav-link" href="/sounds">Sounds</a></li>
  </ul>
  {% block nav_right %}{% endblock %}
</nav>
<div class="container-fluid">
    {% block content %}{% endblock %}
</div>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
